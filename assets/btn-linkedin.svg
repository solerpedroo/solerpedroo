<svg xmlns="http://www.w3.org/2000/svg" width="130" height="36" viewBox="0 0 130 36">
  <style>
    .bg { fill: #161b22; stroke: #30363d; stroke-width: 1; }
    .txt { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 600; fill: #e6edf3; letter-spacing: 0.5px; }
    .dot { fill: #0A66C2; animation: pulse 2s infinite alternate; }
    @keyframes pulse { 0% { opacity: 0.6; } 100% { opacity: 1; } }
  </style>
  <rect class="bg" width="128" height="34" x="1" y="1" rx="17" ry="17" />
  <circle class="dot" cx="38" cy="18" r="4" />
  <text class="txt" x="65" y="22.5" text-anchor="middle">LinkedIn</text>
</svg>
