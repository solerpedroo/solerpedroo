<svg xmlns="http://www.w3.org/2000/svg" width="900" height="60" viewBox="0 0 900 60" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="900" height="60" rx="10"/>
    </clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <rect width="900" height="60" fill="url(#bg)"/>
    <rect x="0.5" y="0.5" width="899" height="59" rx="9.5" stroke="#30363d" stroke-width="1" fill="none"/>
    <rect x="0" y="58" width="900" height="2" fill="url(#accent)" opacity="0.8"/>
    <text x="450" y="35" text-anchor="middle" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="400" font-size="13" fill="#8b949e" letter-spacing="0.5">
      Software Engineer · Campinas, SP, Brazil
    </text>
    <text x="450" y="35" text-anchor="middle" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="400" font-size="13" fill="#8b949e" letter-spacing="0.5" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="1s" begin="0.5s" fill="freeze"/>
    </text>
  </g>
</svg>
