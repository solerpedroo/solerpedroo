<svg xmlns="http://www.w3.org/2000/svg" width="900" height="110" viewBox="0 0 900 110" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0064F5" stop-opacity="0"/>
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0064F5" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="btnAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="900" height="110" rx="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="900" height="110" fill="url(#bg)"/>
    <rect x="0.5" y="0.5" width="899" height="109" rx="11.5" stroke="#30363d" stroke-width="1" fill="none"/>

    <!-- Top accent line -->
    <rect x="0" y="0" width="900" height="2" fill="url(#accent)" opacity="0.8"/>

    <!-- Subtle background glow -->
    <circle cx="100" cy="55" r="50" fill="#58a6ff" opacity="0.03"/>
    <circle cx="800" cy="55" r="60" fill="#00b4d8" opacity="0.03"/>

    <!-- CTA Subtitle -->
    <text x="450" y="40" text-anchor="middle" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="12" fill="#58a6ff" letter-spacing="4" opacity="0">
      COLLABORATE &amp; CREATE
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.2s" fill="freeze"/>
    </text>

    <!-- CTA Headline -->
    <text x="450" y="72" text-anchor="middle" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="20" fill="#e6edf3" letter-spacing="0.5" opacity="0">
      Let's build the next generation of software together.
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.4s" fill="freeze"/>
    </text>

    <!-- Bottom accent line -->
    <rect x="0" y="108" width="900" height="2" fill="url(#accent)" opacity="0.8"/>

    <!-- Scanning line animation -->
    <line x1="-50" y1="0" x2="-50" y2="110" stroke="#58a6ff" stroke-width="2" opacity="0.06">
      <animate attributeName="x1" from="-50" to="950" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" from="-50" to="950" dur="8s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>
