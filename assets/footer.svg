<svg xmlns="http://www.w3.org/2000/svg" width="900" height="80" viewBox="0 0 900 80" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0064F5" stop-opacity="0"/>
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0064F5" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="900" height="80" rx="12"/>
    </clipPath>
  </defs>
  
  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="900" height="80" fill="url(#bg)"/>
    <rect x="0.5" y="0.5" width="899" height="79" rx="11.5" stroke="#30363d" stroke-width="1" fill="none"/>
    
    <!-- Central separator line -->
    <line x1="150" y1="40" x2="750" y2="40" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
    
    <!-- Pulse node -->
    <circle cx="450" cy="40" r="4" fill="#58a6ff" opacity="0.8">
      <animate attributeName="r" values="3;6;3" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Text Elements -->
    <text x="450" y="28" text-anchor="middle" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="11" fill="#e6edf3" letter-spacing="3">
      PEDRO HENRIQUE CONTARDI SOLER
    </text>
    <text x="450" y="56" text-anchor="middle" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="600" font-size="9" fill="#58a6ff" letter-spacing="2">
      SOFTWARE ENGINEER &middot; CAMPINAS, SP, BRAZIL
    </text>
    
    <!-- Bottom highlight -->
    <rect x="0" y="78" width="900" height="2" fill="url(#accent)" opacity="0.8"/>
    
    <!-- Futuristic scanning line -->
    <line x1="0" y1="0" x2="0" y2="80" stroke="#58a6ff" stroke-width="2" opacity="0.08">
      <animate attributeName="x1" from="-50" to="950" dur="6s" repeatCount="indefinite" />
      <animate attributeName="x2" from="-50" to="950" dur="6s" repeatCount="indefinite" />
    </line>
  </g>
</svg>
