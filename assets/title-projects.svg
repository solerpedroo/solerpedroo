<svg xmlns="http://www.w3.org/2000/svg" width="900" height="80" viewBox="0 0 900 80">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#58a6ff" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#7c3aed" stop-opacity="1"/>
      <stop offset="70%" stop-color="#7c3aed" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <text x="450" y="48" text-anchor="middle" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="26" fill="#e6edf3" letter-spacing="4">
    FEATURED ENGINEERING PROJECTS
  </text>
  <rect x="380" y="64" width="140" height="3" rx="1.5" fill="url(#accent)" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="width" values="80;160;80" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x" values="410;370;410" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="150" y="66" width="600" height="1" fill="url(#line)" opacity="0.15"/>
</svg>
