<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="310" y1="0" x2="590" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <linearGradient id="subtleGlow" x1="450" y1="0" x2="450" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#00b4d8" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="roundedRect">
      <rect width="900" height="220" rx="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedRect)">
    <!-- Background -->
    <rect width="900" height="220" fill="url(#bg)"/>
    <rect width="900" height="220" fill="url(#subtleGlow)"/>

    <!-- Subtle grid pattern -->
    <g opacity="0.03" stroke="#58a6ff" stroke-width="0.5">
      <line x1="0" y1="40" x2="900" y2="40"/>
      <line x1="0" y1="80" x2="900" y2="80"/>
      <line x1="0" y1="120" x2="900" y2="120"/>
      <line x1="0" y1="160" x2="900" y2="160"/>
      <line x1="0" y1="200" x2="900" y2="200"/>
      <line x1="150" y1="0" x2="150" y2="220"/>
      <line x1="300" y1="0" x2="300" y2="220"/>
      <line x1="450" y1="0" x2="450" y2="220"/>
      <line x1="600" y1="0" x2="600" y2="220"/>
      <line x1="750" y1="0" x2="750" y2="220"/>
    </g>

    <!-- Border -->
    <rect x="0.5" y="0.5" width="899" height="219" rx="11.5" stroke="#30363d" stroke-width="1" fill="none"/>

    <!-- Accent line at top -->
    <rect x="0" y="0" width="900" height="2" fill="url(#accent)" opacity="0.8"/>

    <g class="float-container">
      <!-- Name -->
      <text x="450" y="82" text-anchor="middle" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="42" fill="#e6edf3" letter-spacing="-0.5" opacity="0">
        Pedro Soler
        <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.1s" fill="freeze"/>
      </text>

      <!-- Role (Software Engineer) - Standout Gradient Text -->
      <text x="450" y="116" text-anchor="middle" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="20" fill="url(#accent)" letter-spacing="2" opacity="0">
        SOFTWARE ENGINEER
        <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.3s" fill="freeze"/>
      </text>

      <!-- Accent underline -->
      <rect x="385" y="130" width="130" height="2" rx="1" fill="url(#accent)" opacity="0">
        <animate attributeName="opacity" from="0" to="0.7" dur="0.8s" begin="0.5s" fill="freeze"/>
      </rect>

      <!-- Tagline -->
      <text x="450" y="160" text-anchor="middle" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="400" font-size="14" fill="#8b949e" letter-spacing="0.3" opacity="0">
        AI · Full Stack · Mobile · Cloud
        <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.6s" fill="freeze"/>
      </text>

      <!-- Location -->
      <text x="450" y="188" text-anchor="middle" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="400" font-size="12" fill="#6e7681" letter-spacing="0.3" opacity="0">
        <tspan fill="#58a6ff" font-weight="bold">●</tspan> Campinas, São Paulo, Brazil
        <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.8s" fill="freeze"/>
      </text>
    </g>

    <!-- Subtle corner decoration with breathing pulse (all blue) -->
    <g opacity="0.05">
      <circle cx="50" cy="50" r="80" fill="#58a6ff">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="r" values="70;90;70" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="850" cy="170" r="60" fill="#00b4d8">
        <animate attributeName="opacity" values="1;0.3;1" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="r" values="55;70;55" dur="5s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg>
