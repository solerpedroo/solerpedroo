<svg xmlns="http://www.w3.org/2000/svg" width="900" height="120" viewBox="0 0 900 120" fill="none">
  <defs>
    <linearGradient id="borderGrad" x1="0" y1="0" x2="900" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#30363d" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#30363d" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="900" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#161b22" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  
  <rect x="0.5" y="0.5" width="899" height="119" rx="10" fill="url(#bgGrad)" stroke="url(#borderGrad)"/>
  
  <!-- Subtle design lines on the sides -->
  <line x1="15" y1="20" x2="15" y2="100" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="885" y1="20" x2="885" y2="100" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>

  <text x="450" y="38" text-anchor="middle" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="500" font-size="14" fill="#8b949e" letter-spacing="0.3">
    Software Engineering student at PUC Campinas &amp; certified Informatics Technician, focused on
  </text>
  <text x="450" y="64" text-anchor="middle" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="500" font-size="14" fill="#8b949e" letter-spacing="0.3">
    building production-quality systems across <tspan fill="#58a6ff" font-weight="700">AI &amp; Computer Vision</tspan>, <tspan fill="#58a6ff" font-weight="700">Mobile</tspan>, and <tspan fill="#58a6ff" font-weight="700">Cloud</tspan> —
  </text>
  <text x="450" y="90" text-anchor="middle" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="500" font-size="14" fill="#e6edf3" letter-spacing="0.3">
    from award-winning YOLOv8 safety platforms to LLM-powered developer tools and offline-first Flutter applications.
