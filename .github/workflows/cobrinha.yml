name: generate snake animation

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?color_snake=#58a6ff&color_dots=#161b22,#0d1117,#1f6feb,#58a6ff,#7c3aed
            dist/snake-dark.svg?color_snake=#58a6ff&color_dots=#161b22,#0d1117,#1f6feb,#58a6ff,#7c3aed&palette=github-dark

      - name: publish files
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}